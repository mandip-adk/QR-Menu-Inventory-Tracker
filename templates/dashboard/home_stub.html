{% extends "base/base.html" %}
{% block title %}Dashboard – Sajilo Pasal{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <i class="bi bi-speedometer2 display-3" style="color: var(--sajilo-primary);"></i>
        <h4 class="fw-bold mt-3">Welcome, {{ request.user.short_name }}!</h4>
        <p class="text-muted">
          You're logged in. The full dashboard is built on <strong>Day 13</strong>.
        </p>
        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-danger mt-2">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
