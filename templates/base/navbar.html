{% load static %}
<nav class="navbar navbar-expand-lg navbar-sajilo sticky-top">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'dashboard:home' %}">
      <i class="bi bi-shop me-2"></i>Sajilo Pasal
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#sajiloNavbar" aria-controls="sajiloNavbar"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sajiloNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">

        {% if request.user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard:home' %}">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <span class="nav-link text-white-50">
              <i class="bi bi-person-circle me-1"></i>{{ request.user.short_name }}
            </span>
          </li>
          <li class="nav-item">
            <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="btn btn-sm btn-outline-light ms-lg-2">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
              </button>
            </form>
          </li>

        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'accounts:login' %}">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-sm btn-outline-light ms-lg-2" href="{% url 'accounts:register' %}">
              <i class="bi bi-person-plus me-1"></i>Sign Up
            </a>
          </li>
        {% endif %}

      </ul>
    </div>

  </div>
</nav>
